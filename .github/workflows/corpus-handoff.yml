name: Prepare synthetic corpus Azure MCP handoff

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  corpus-handoff:
    runs-on: ubuntu-24.04
    environment: azure-deploy
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Build and independently verify deterministic handoff
        shell: bash
        run: |
          python3 scripts/azure/prepare-corpus-handoff.py prepare /tmp/corpus-handoff
          python3 scripts/azure/prepare-corpus-handoff.py verify /tmp/corpus-handoff
      - name: Upload non-mutating corpus handoff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: corpus-mcp-handoff-${{ github.run_id }}
          path: /tmp/corpus-handoff
          if-no-files-found: error
          retention-days: 7
