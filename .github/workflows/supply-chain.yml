name: Build, SBOM, attest, and sign images

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  discover:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Discover version-controlled Dockerfiles
        id: matrix
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          rows = []
          dockerfiles = set(Path('.').glob('**/Dockerfile'))
          dockerfiles.update(Path('deploy').glob('*.Dockerfile'))
          for dockerfile in sorted(dockerfiles):
              if any(part in {'.git', 'node_modules'} for part in dockerfile.parts):
                  continue
              if dockerfile == Path('models/phi-server/Dockerfile'):
                  continue  # protected phi-fallback.yml owns the multi-GB model build
              if dockerfile.parent == Path('deploy'):
                  context = '.'
                  name = dockerfile.stem.lower()
              else:
                  context = str(dockerfile.parent) if str(dockerfile.parent) != '.' else '.'
                  name = ('root' if context == '.' else context.replace('/', '-')).lower()
              rows.append({'name': name, 'context': context, 'dockerfile': str(dockerfile)})
          print('matrix=' + json.dumps({'include': rows}, separators=(',', ':')))
          PY

  build:
    needs: discover
    if: needs.discover.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Normalize immutable image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/aica-${{ matrix.name }}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2
      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}
      - name: Scan pushed image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      - name: Keyless-sign image by digest
        env:
          IMAGE: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"
      - name: Verify keyless signature identity
        env:
          IMAGE: ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}
        shell: bash
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/supply-chain.yml@refs/(heads|tags)/" \
            "$IMAGE"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Record immutable deployment reference
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SOURCE_COMMIT: ${{ github.sha }}
          DOCKERFILE: ${{ matrix.dockerfile }}
        shell: bash
        run: |
          jq --null-input \
            --arg image "$IMAGE_NAME" \
            --arg digest "$IMAGE_DIGEST" \
            --arg commit "$SOURCE_COMMIT" \
            --arg dockerfile "$DOCKERFILE" \
            '{image: ($image + "@" + $digest), digest: $digest, sourceCommit: $commit, dockerfile: $dockerfile, signed: true, provenanceAttested: true}' \
            > image-${{ matrix.name }}.json
      - name: Upload SBOM and immutable reference
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom-${{ matrix.name }}-${{ github.sha }}
          path: |
            sbom-${{ matrix.name }}.spdx.json
            image-${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 30
