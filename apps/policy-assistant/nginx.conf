server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;
  charset utf-8;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  location = /healthz {
    access_log off;
    proxy_http_version 1.1;
    proxy_pass http://127.0.0.1:8000/healthz;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 5s;
    add_header Cache-Control "no-store" always;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # The Python policy API runs as a localhost sidecar in the same Container App.
  # Container Apps Easy Auth injects the pseudonymous principal header at ingress;
  # preserve it across the nginx-to-sidecar hop.
  location /api/ {
    proxy_http_version 1.1;
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-MS-CLIENT-PRINCIPAL $http_x_ms_client_principal;
    proxy_set_header X-MS-CLIENT-PRINCIPAL-ID $http_x_ms_client_principal_id;
    proxy_set_header X-AICA-Reviewer $http_x_aica_reviewer;
    proxy_set_header X-AICA-Roles $http_x_aica_roles;
    proxy_connect_timeout 5s;
    proxy_read_timeout 75s;
    proxy_send_timeout 30s;
  }

  location / {
    add_header Cache-Control "no-store";
    try_files $uri $uri/ /index.html;
  }
}
